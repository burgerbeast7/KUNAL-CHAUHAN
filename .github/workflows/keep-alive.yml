name: Keep Render Server Awake

on:
  schedule:
    # Runs every 14 minutes to prevent Render's 15-minute inactivity shutdown
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render URL
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://kunal-chauhan.onrender.com/api/profile || echo "Failed"
